<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Séries</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Gerador de Séries</h1>
    
    <div class="input-group">
        <input type="text" id="prefixo" value="79/1012" placeholder="Prefixo">
        <input type="number" id="qnt" value="10" placeholder="Qtd">
    </div>

    <button id="btnGerar">Gerar e Copiar</button>
    
    <div id="mensagemStatus"></div> 
    
    <textarea id="resultado" readonly placeholder="Os números aparecerão aqui..."></textarea>
</div>
    <script src="script.js"></script>
</body>
</html>
